<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post-Binary Canvas — Sweet as Hell Designs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:  #FCF434;
      --white:   #F5F5F5;
      --purple:  #9C59D1;
      --black:   #111111;
      --font:    'Courier New', Courier, monospace;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--black);
      font-family: var(--font);
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 1.6rem 2rem;
      gap: 0.35rem;
    }

    #ui h1 {
      font-size: clamp(1.1rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--yellow);
      text-shadow: 0 0 24px rgba(252,244,52,0.55);
    }

    #ui p {
      font-size: clamp(0.65rem, 1.4vw, 0.85rem);
      letter-spacing: 0.12em;
      color: rgba(245,245,245,0.45);
    }

    #corner {
      position: fixed;
      bottom: 1.4rem;
      right: 1.8rem;
      z-index: 10;
      font-family: var(--font);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      color: rgba(156,89,209,0.6);
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <h1>Post-Binary Canvas</h1>
    <p>move / touch to sculpt &nbsp;·&nbsp; click to burst</p>
  </div>

  <div id="corner">sweet as hell designs</div>

  <script>
    (function () {
      'use strict';

      const PALETTE = ['#FCF434', '#F5F5F5', '#9C59D1', '#CF9FFF', '#FFEE77']; // no black in particle colors
      const TWO_PI  = Math.PI * 2;

      const GRADIENT_RADIUS_FACTOR = 0.72; // portion of max(W,H) that the bg gradient covers
      const SCANLINE_SPACING       = 4;    // px between scan-line stripes
      const PULSE_BASE             = 0.08; // minimum glow opacity around cursor
      const PULSE_AMPLITUDE        = 0.04; // oscillation range of glow opacity
      const PULSE_FREQUENCY        = 0.04; // oscillation speed (radians per frame)

      const canvas = document.getElementById('canvas');
      const ctx    = canvas.getContext('2d');

      let W, H, cx, cy;
      let mouse = { x: -9999, y: -9999, px: -9999, py: -9999, down: false };
      let particles = [];
      let raf;

      /* ── resize ── */
      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H / 2;
      }
      window.addEventListener('resize', resize);
      resize();

      /* ── particle pool ── */
      const POOL_SIZE = 900;

      class Particle {
        constructor() { this.reset(cx, cy, true); }

        reset(x, y, idle) {
          this.x  = x;
          this.y  = y;
          const angle  = Math.random() * TWO_PI;
          const speed  = idle
            ? 0.4 + Math.random() * 1.2
            : 2.5 + Math.random() * 6;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.color  = PALETTE[Math.floor(Math.random() * PALETTE.length)];
          this.radius = idle
            ? 1.2 + Math.random() * 2.8
            : 1.8 + Math.random() * 4;
          this.alpha  = 0.7 + Math.random() * 0.3;
          this.decay  = idle
            ? 0.004 + Math.random() * 0.008
            : 0.010 + Math.random() * 0.025;
          this.drag   = 0.982;
          this.alive  = true;
        }

        update() {
          this.vx *= this.drag;
          this.vy *= this.drag;
          this.vy += 0.012; // subtle gravity
          this.x  += this.vx;
          this.y  += this.vy;
          this.alpha -= this.decay;
          if (this.alpha <= 0) this.alive = false;
        }

        draw() {
          ctx.save();
          ctx.globalAlpha = Math.max(0, this.alpha);
          ctx.fillStyle   = this.color;
          ctx.shadowColor = this.color;
          ctx.shadowBlur  = this.radius * 3;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, TWO_PI);
          ctx.fill();
          ctx.restore();
        }
      }

      /* seed idle ambient particles spread across canvas */
      for (let i = 0; i < POOL_SIZE; i++) {
        const p = new Particle();
        p.x = Math.random() * W;
        p.y = Math.random() * H;
        p.vx = (Math.random() - 0.5) * 0.8;
        p.vy = (Math.random() - 0.5) * 0.8;
        p.decay = 0.003 + Math.random() * 0.005;
        particles.push(p);
      }

      /* ── spawn helpers ── */
      function spawnTrail(x, y, count) {
        for (let i = 0; i < count; i++) {
          const p = new Particle();
          p.reset(x, y, true);
          p.decay = 0.006 + Math.random() * 0.012;
          p.radius = 1.4 + Math.random() * 3;
          particles.push(p);
        }
      }

      function spawnBurst(x, y) {
        const count = 80 + Math.floor(Math.random() * 60);
        for (let i = 0; i < count; i++) {
          const p = new Particle();
          p.reset(x, y, false);
          particles.push(p);
        }
      }

      function replenishAmbient() {
        if (particles.length < POOL_SIZE * 0.5) {
          for (let i = 0; i < 40; i++) {
            const p = new Particle();
            p.x = Math.random() * W;
            p.y = Math.random() * H;
            p.vx = (Math.random() - 0.5) * 0.8;
            p.vy = (Math.random() - 0.5) * 0.8;
            p.decay = 0.003 + Math.random() * 0.006;
            particles.push(p);
          }
        }
      }

      /* ── draw background gradient ── */
      function drawBackground() {
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * GRADIENT_RADIUS_FACTOR);
        grad.addColorStop(0,   'rgba(30,10,50,0.92)');
        grad.addColorStop(0.5, 'rgba(15,5,25,0.95)');
        grad.addColorStop(1,   'rgba(8,2,12,0.98)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }

      /* ── scan-line overlay (drawn once on an offscreen canvas) ── */
      let scanLines = null;
      function buildScanLines() {
        const oc  = document.createElement('canvas');
        oc.width  = 1;
        oc.height = H;
        const ox  = oc.getContext('2d');
        for (let y = 0; y < H; y += SCANLINE_SPACING) {
          ox.fillStyle = 'rgba(0,0,0,0.18)';
          ox.fillRect(0, y, 1, 2);
        }
        scanLines = ctx.createPattern(oc, 'repeat-x');
      }

      function drawScanLines() {
        if (!scanLines) buildScanLines();
        ctx.save();
        ctx.fillStyle = scanLines;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      /* ── main loop ── */
      let frame = 0;
      function loop() {
        raf = requestAnimationFrame(loop);
        frame++;

        // fade trail
        ctx.fillStyle = 'rgba(8,2,12,0.22)';
        ctx.fillRect(0, 0, W, H);

        // ambient glow pulse behind mouse
        if (mouse.x > 0) {
          const pulse = PULSE_BASE + PULSE_AMPLITUDE * Math.sin(frame * PULSE_FREQUENCY);
          const grd   = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 160);
          grd.addColorStop(0,   `rgba(156,89,209,${pulse})`);
          grd.addColorStop(0.4, `rgba(252,244,52,${pulse * 0.4})`);
          grd.addColorStop(1,    'rgba(0,0,0,0)');
          ctx.fillStyle = grd;
          ctx.fillRect(0, 0, W, H);
        }

        // update & draw
        particles = particles.filter(p => p.alive);
        for (const p of particles) { p.update(); p.draw(); }

        // trail from mouse movement
        if (frame % 2 === 0) {
          const dx = mouse.x - mouse.px;
          const dy = mouse.y - mouse.py;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 4) {
            spawnTrail(mouse.x, mouse.y, Math.min(8, Math.floor(dist * 0.4)));
            mouse.px = mouse.x;
            mouse.py = mouse.y;
          }
        }

        drawScanLines();
        replenishAmbient();
      }

      loop();

      /* ── input ── */
      function onMove(x, y) {
        mouse.x = x;
        mouse.y = y;
      }

      function onBurst(x, y) {
        spawnBurst(x, y);
      }

      canvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
      canvas.addEventListener('mousedown', e => { onBurst(e.clientX, e.clientY); });

      canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        onMove(t.clientX, t.clientY);
      }, { passive: false });

      canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        onMove(t.clientX, t.clientY);
        onBurst(t.clientX, t.clientY);
      }, { passive: false });

      canvas.addEventListener('touchend', () => {
        mouse.x = -9999;
        mouse.y = -9999;
      });

      window.addEventListener('resize', () => {
        scanLines = null; // rebuild scan lines on resize
        resize();
      });

    }());
  </script>
</body>
</html>
